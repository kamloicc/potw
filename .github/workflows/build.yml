name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/kamloicc/potw

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        working-directory: ./backend
        run: mvn clean test

      - name: Build JAR
        working-directory: ./backend
        run: mvn clean package -DskipTests

      - name: Install Pack CLI
        run: |
          sudo add-apt-repository ppa:cncf-buildpacks/pack-cli
          sudo apt-get update
          sudo apt-get install pack-cli

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          
          # Extract version from tag or use commit SHA
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            
            # Parse semantic version
            if [[ $VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              MAJOR="${BASH_REMATCH[1]}"
              MINOR="${BASH_REMATCH[2]}"
              PATCH="${BASH_REMATCH[3]}"
              echo "major=${MAJOR}" >> $GITHUB_OUTPUT
              echo "minor=${MINOR}" >> $GITHUB_OUTPUT
              echo "patch=${PATCH}" >> $GITHUB_OUTPUT
            fi
          else
            echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Build image with Buildpacks
        working-directory: ./backend
        run: |
          pack build ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} \
            --builder paketobuildpacks/builder-jammy-base \
            --path . \
            --env BP_JVM_VERSION=21

      - name: Tag release versions
        if: steps.meta.outputs.is_release == 'true'
        run: |
          # Tag with full version (v1.2.3)
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} ${{ env.IMAGE_NAME }}:v${{ steps.meta.outputs.version }}
          
          # Tag with major.minor (v1.2)
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} ${{ env.IMAGE_NAME }}:v${{ steps.meta.outputs.major }}.${{ steps.meta.outputs.minor }}
          
          # Tag with major (v1)
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} ${{ env.IMAGE_NAME }}:v${{ steps.meta.outputs.major }}
          
          # Tag as latest
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} ${{ env.IMAGE_NAME }}:latest

      - name: Tag latest (main branch only, non-release)
        if: github.ref == 'refs/heads/main' && steps.meta.outputs.is_release == 'false'
        run: |
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} ${{ env.IMAGE_NAME }}:latest

      - name: Push images (release)
        if: steps.meta.outputs.is_release == 'true'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          docker push ${{ env.IMAGE_NAME }}:v${{ steps.meta.outputs.version }}
          docker push ${{ env.IMAGE_NAME }}:v${{ steps.meta.outputs.major }}.${{ steps.meta.outputs.minor }}
          docker push ${{ env.IMAGE_NAME }}:v${{ steps.meta.outputs.major }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Push images (non-release)
        if: steps.meta.outputs.is_release == 'false'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            docker push ${{ env.IMAGE_NAME }}:latest
          fi
