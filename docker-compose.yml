version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: playeroftheweek
    volumes:
      - mongodb_data:/data/db
    networks:
      - player-network

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DOMAIN: localhost
    volumes:
      - minio_data:/data
    networks:
      - player-network

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/player-videos --ignore-existing;
      mc anonymous set download myminio/player-videos;
      echo 'MinIO initialization complete';
      "
    networks:
      - player-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/playeroftheweek
      MINIO_URL: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost/minio
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: player-videos
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    depends_on:
      - mongodb
      - minio
    networks:
      - player-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - player-network

volumes:
  mongodb_data:
  minio_data:

networks:
  player-network:
    driver: bridge
