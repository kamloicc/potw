<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player of the Week</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <header>
        <h1>Player of the Week</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="archive.html">Archive</a>
            <a href="admin.html">Admin</a>
        </nav>
    </header>
    
    <main id="main-content">
        <div id="loading">Loading...</div>
        
        <article id="post-content" style="display: none;">
            <div id="video-container">
                <video id="video-player" controls width="100%">
                    Your browser does not support the video tag.
                </video>
            </div>
            
            <div id="post-details">
                <h2 id="player-name"></h2>
                <h3 id="post-title"></h3>
                <p id="week-date"></p>
                <div id="post-content-text"></div>
            </div>
            
            <div id="navigation">
                <button id="prev-button">← Previous Player</button>
                <button id="next-button">Next Player →</button>
            </div>
        </article>
    </main>
    
    <script src="src/js/app.js"></script>
    <script src="src/js/home.js"></script>
</body>
</html>
